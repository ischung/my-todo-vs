name: Build & Push Image

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build:
    name: Build + Trivy + GHCR Push
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      digest: ${{ steps.push.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=sha-,format=long
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build image (load locally for scan, no push yet)
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: ${{ env.IMAGE }}:scan-${{ github.sha }}
          build-args: |
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Report HIGH and CRITICAL, but gate only on CRITICAL.
      # HIGH vulnerabilities are typically in transitive deps that Dependabot
      # will update over time; failing on them blocks all deployments.
      - name: Trivy image scan (report HIGH + CRITICAL, gate on CRITICAL)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE }}:scan-${{ github.sha }}
          severity: 'HIGH,CRITICAL'
          exit-code: '0'
          ignore-unfixed: true

      - name: Trivy image scan (CRITICAL gate)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE }}:scan-${{ github.sha }}
          severity: 'CRITICAL'
          exit-code: '1'
          ignore-unfixed: true

      - name: Push image to GHCR (multi-tag)
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Echo result
        run: |
          echo "Image pushed: ${{ steps.meta.outputs.tags }}"
          echo "Digest: ${{ steps.push.outputs.digest }}"

  image-smoke:
    name: Image Smoke (pull + run + Playwright)
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci --workspace=e2e

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull freshly pushed image
        run: |
          docker pull ${{ env.IMAGE }}:sha-${{ github.sha }}

      - name: Start container
        run: |
          docker run -d --name todo-smoke -p 8080:8080 \
            ${{ env.IMAGE }}:sha-${{ github.sha }}
          # wait for health
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/api/health >/dev/null; then
              echo "health ok (${i}s)"
              break
            fi
            sleep 1
            if [ "$i" = "30" ]; then
              echo "::error::health check timeout"
              docker logs todo-smoke
              exit 1
            fi
          done

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
        working-directory: e2e

      - name: Run @smoke tests
        run: npx playwright test --grep @smoke
        working-directory: e2e
        env:
          E2E_BASE_URL: http://localhost:8080

      - name: Container logs (always)
        if: always()
        run: docker logs todo-smoke || true

      - name: Cleanup
        if: always()
        run: docker stop todo-smoke && docker rm todo-smoke || true

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
